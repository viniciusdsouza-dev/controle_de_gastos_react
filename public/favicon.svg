<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0f1220"/>
  <!-- Wallet body -->
  <rect x="4" y="11" width="20" height="13" rx="2.5" fill="none" stroke="#00e5ff" stroke-width="1.8"/>
  <!-- Wallet flap -->
  <path d="M7 11V9a1.5 1.5 0 011.5-1.5h11A1.5 1.5 0 0121 9v2" stroke="#00e5ff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Pocket -->
  <rect x="18" y="15" width="8" height="5.5" rx="1.5" fill="#0f1220" stroke="#00e5ff" stroke-width="1.6"/>
  <!-- Coin dot -->
  <circle cx="22" cy="17.75" r="1.4" fill="#00e5ff"/>
  <!-- Glow effect -->
  <rect x="4" y="11" width="20" height="13" rx="2.5" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.15"/>
</svg>
